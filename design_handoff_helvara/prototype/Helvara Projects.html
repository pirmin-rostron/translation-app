// ── Derived project badge ───────────────────────────────────────────────────
function deriveProjectBadge(p) {
  const s = p.stats;
  if (p.document_count === 0) return { label: "No documents", classes: "bg-brand-bg text-brand-subtle" };
  if (s.total_jobs > 0 && s.completed_count >= s.total_jobs) return { label: "✓ Completed", classes: "bg-status-successBg text-status-success" };
  if (p.due_date) {
    const due = new Date(p.due_date);
    const now = new Date("2026-04-22");
    const diff = Math.ceil((due - now) / 86400000);
    if (diff < 0) return { label: "Overdue", classes: "bg-status-errorBg text-status-error" };
    if (diff <= 7) return { label: "⚠ Due soon", classes: "bg-status-warningBg text-status-warning" };
  }
  return { label: "In progress", classes: "bg-status-infoBg text-status-info" };
}

  useEffect(() => {

    document.addEventListener("keydown", h);
    return () => document.removeEventListener("keydown", h);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-brand-text/30 backdrop-blur-sm p-6 animate-fadein" onClick={onClose}>
      <div
        className={`w-full ${maxWidth} rounded-[22px] border border-brand-border bg-brand-surface p-7 shadow-raised animate-scalein`}
        onClick={(e) => e.stopPropagation()}
      >
        {children}
      </div>
    </div>
  );
}

  const totalJobs = projects.reduce((a, p) => a + p.stats.total_jobs, 0);

  const overall = totalJobs > 0 ? Math.round((totalCompleted / totalJobs) * 100) : 0;

  const [filter, setFilter] = useState("all"); // all | active | completed | empty

  const filtered = projects.filter((p) => {
    if (filter === "active") return p.stats.total_jobs > 0 && p.stats.completed_count < p.stats.total_jobs;
    if (filter === "completed") return p.stats.total_jobs > 0 && p.stats.completed_count >= p.stats.total_jobs;
    if (filter === "empty") return p.document_count === 0;
    return true;
  });

  return (
    <div className="mx-auto max-w-[1320px] px-10 py-10">
      <header className="mb-8 flex items-end justify-between gap-6">
        <div>
          <p className="mb-2 text-[0.6875rem] font-medium uppercase tracking-[0.18em] text-brand-subtle m-0">Workspace</p>
          <h1 className="font-display text-[2.5rem] font-semibold tracking-display leading-[1.05] text-brand-text m-0">
            Projects
          </h1>
          <p className="mt-2.5 max-w-xl text-[0.9375rem] text-brand-muted m-0">
            Containers for documents, target languages, and translation jobs.
          </p>
        </div>
        <button
          onClick={() => dispatch({ type: "OPEN_NEW_PROJECT" })}
          className="flex items-center gap-1.5 rounded-full bg-brand-text px-4 py-2 text-[0.8125rem] font-medium text-white shadow-card transition-all hover:bg-brand-accent"
        >
          <Icon.Plus className="h-3.5 w-3.5" /> New project
        </button>
      </header>

      {/* Stat strip */}
      <section className="mb-8 grid grid-cols-4 gap-0 overflow-hidden rounded-2xl border border-brand-border bg-brand-surface shadow-card">
        <StatTile label="Total projects" value={totalProjects} meta={`${totalProjects} active`} />
        <StatTile label="Documents" value={totalDocs} meta={`across ${totalProjects} projects`} divider />
        <StatTile label="In review" value={totalInReview} valueClass="text-brand-accent" meta="awaiting approval" divider />
        <StatTile label="Overall progress" value={`${overall}%`} meta={null} progress={overall} divider />
      </section>

      {/* Filter bar */}
      <div className="mb-5 flex items-center justify-between">
        <div className="inline-flex rounded-full border border-brand-border bg-brand-surface p-0.5 shadow-card">
          {[
            { k: "all", label: `All ${projects.length}` },
            { k: "active", label: "Active" },
            { k: "completed", label: "Completed" },
            { k: "empty", label: "Empty" },
          ].map((t) => (
            <button
              key={t.k}
              onClick={() => setFilter(t.k)}
              className={`rounded-full px-3.5 py-1.5 text-[0.8125rem] font-medium transition-colors ${
                filter === t.k ? "bg-brand-text text-white" : "text-brand-muted hover:text-brand-text"
              }`}
            >
              {t.label}
            </button>
          ))}
        </div>
        <span className="text-xs text-brand-subtle">{filtered.length} shown</span>
      </div>

      {/* Cards grid */}
      <div className="grid grid-cols-2 gap-5">
        {filtered.map((p) => (
          <ProjectCard key={p.id} project={p} onOpen={() => dispatch({ type: "OPEN_PROJECT", id: p.id })} />
        ))}
      </div>
    </div>
  );
}

function StatTile({ label, value, valueClass = "text-brand-text", meta, progress, divider }) {
  const isZero = value === 0 || value === "0%" || value === "—";
  return (
    <div className={`px-6 py-5 ${divider ? "border-l border-brand-borderSoft" : ""}`}>
      <p className="text-[0.6875rem] font-medium uppercase tracking-[0.14em] text-brand-subtle m-0">{label}</p>
      <p className={`mt-2.5 font-display text-[2rem] font-semibold leading-none tracking-display m-0 ${isZero ? "text-brand-subtle" : valueClass}`}>{value}</p>
      {meta && <p className="mt-2 text-xs text-brand-subtle m-0">{meta}</p>}
      {typeof progress === "number" && (
        <div className="mt-2.5 h-1 w-full rounded-full bg-brand-sunken overflow-hidden">
          <div className="h-full rounded-full bg-brand-text transition-all duration-700" style={{ width: `${progress}%` }} />
        </div>
      )}
    </div>
  );
}

function ProjectCard({ project, onOpen }) {
  const badge = deriveProjectBadge(project);
  const pct = project.stats.total_jobs > 0 ? Math.round((project.stats.completed_count / project.stats.total_jobs) * 100) : 0;
  return (
    <button
      onClick={onOpen}
      className="group relative flex flex-col overflow-hidden rounded-2xl border border-brand-border bg-brand-surface p-6 text-left shadow-card transition-all hover:-translate-y-0.5 hover:shadow-raised"
    >
      {/* accent rail on hover */}
      <span className="pointer-events-none absolute inset-y-0 left-0 w-0.5 bg-brand-accent opacity-0 transition-opacity group-hover:opacity-100" />

      <div className="flex items-start justify-between gap-3">
        <div className="min-w-0 flex-1">
          <p className="font-display text-[1.25rem] font-semibold leading-tight tracking-display text-brand-text m-0 line-clamp-1">{project.name}</p>
          {project.pinned && <span className="mt-1.5 inline-flex items-center gap-1 text-[0.6875rem] font-medium text-brand-accent"><Icon.Sparkle className="h-2.5 w-2.5" /> Pinned</span>}
        </div>
        <span className={`shrink-0 rounded-full px-2.5 py-1 text-[0.6875rem] font-medium ${badge.classes}`}>{badge.label}</span>
      </div>

      <div className="mt-2 h-10">
        {project.description ? (
          <p className="line-clamp-2 text-[0.8125rem] leading-relaxed text-brand-muted m-0">{project.description}</p>
        ) : (
          <p className="text-[0.8125rem] italic text-brand-subtle m-0">No description added</p>
        )}
      </div>

      <div className="mt-3.5 flex flex-wrap items-center gap-1.5">
        {project.target_languages.map((l) => (
          <span key={l} className="inline-flex items-center gap-1.5 rounded-full border border-brand-border bg-brand-sunken/60 px-2 py-0.5 text-[0.6875rem] font-medium text-brand-muted">
            <span className="font-mono text-brand-text">{lang(l).code}</span>
            <span>{lang(l).name.replace(/\s*\(.+\)$/, '')}</span>
          </span>
        ))}
      </div>

      <div className="mt-5 grid grid-cols-4 gap-2 rounded-xl bg-brand-sunken/50 p-3">
        <StatMicro value={project.document_count} label="Docs" />
        <StatMicro value={project.stats.total_words.toLocaleString()} label="Words" />
        <StatMicro value={project.stats.completed_count} label="Done" tone="success" />
        <StatMicro value={project.stats.in_review_count} label="Review" tone="accent" />
      </div>

      <div className="mt-4">
        {project.document_count === 0 ? (
          <p className="text-[0.6875rem] text-brand-subtle m-0">No documents yet — upload to get started</p>
        ) : (
          <>
            <div className="mb-1.5 flex items-center justify-between">
              <span className="text-[0.6875rem] text-brand-subtle">Progress</span>
              <span className="font-mono text-[0.6875rem] font-medium text-brand-text tabular-nums">{pct}%</span>
            </div>
            <div className="h-1 w-full rounded-full bg-brand-sunken overflow-hidden">
              <div className="h-full rounded-full bg-gradient-to-r from-brand-accent to-brand-accentHov transition-all duration-700" style={{ width: `${pct}%` }} />
            </div>
          </>
        )}
      </div>
    </button>
  );
}

function StatMicro({ value, label, tone = "default" }) {
  const zero = value === 0 || value === "0";
  const cls =
    zero ? "text-brand-subtle" :
    tone === "success" ? "text-emerald-700" :
    tone === "accent" ? "text-brand-accent" :
    "text-brand-text";
  return (
    <div className="text-center">
      <p className={`font-display text-[1.125rem] font-semibold leading-none m-0 ${cls}`}>{value}</p>
      <p className="mt-1 text-[0.625rem] uppercase tracking-wider text-brand-subtle m-0">{label}</p>
    </div>
  );
}

// File extension chip (matches Documents page)
function FileExtChip({ name }) {
  const ext = (name.split(".").pop() || "").toUpperCase();
  const palette = {
    DOCX: "bg-blue-50 text-blue-700 ring-blue-200",
    RTF:  "bg-violet-50 text-violet-700 ring-violet-200",
    TXT:  "bg-slate-100 text-slate-700 ring-slate-200",
    PDF:  "bg-red-50 text-red-700 ring-red-200",
  }[ext] || "bg-brand-sunken text-brand-muted ring-brand-border";
  return (
    <span className={`flex h-8 w-8 shrink-0 items-center justify-center rounded-lg font-mono text-[0.5625rem] font-semibold ring-1 ring-inset ${palette}`}>
      {ext}
    </span>
  );
}

// Stat cell used inside the stats-strip card (project-scoped to avoid collision with dashboard's StatCell)
function ProjectStatCell({ label, value, meta, valueClass, progress, bordered }) {
  return (
    <div className={`px-5 py-4 ${bordered ? "border-l border-brand-borderSoft" : ""}`}>
      <p className="text-[0.6875rem] font-medium uppercase tracking-[0.14em] text-brand-subtle m-0">{label}</p>
      <p className={`mt-2 font-display text-[1.75rem] font-semibold leading-none tracking-display m-0 ${valueClass || "text-brand-text"}`}>{value}</p>
      {progress != null ? (
        <div className="mt-3 h-1 w-full overflow-hidden rounded-full bg-brand-sunken">
          <div className="h-full rounded-full bg-gradient-to-r from-brand-accent to-brand-accentHov transition-[width] duration-700" style={{ width: `${progress}%` }} />
        </div>
      ) : meta ? (
        <p className="mt-1.5 text-[0.75rem] text-brand-muted m-0">{meta}</p>
      ) : null}
    </div>
  );
}

function JobRow({ job, doc, expanded, onToggle, isLastOfLastDoc }) {
  const isProc = job.status === "processing";
  const isReview = job.status === "in_review";
  const canExpand = isReview || job.status === "completed";

  return (
    <>
      <div
        className={`flex items-center gap-2.5 border-t border-brand-borderSoft bg-brand-surface px-5 py-2.5 pl-14 transition-colors ${
          isProc ? "opacity-70" : canExpand ? "cursor-pointer hover:bg-brand-sunken/40" : ""
        } ${expanded ? "bg-brand-accentSoft/40" : ""}`}
        onClick={() => canExpand && onToggle()}
      >
        <span className="inline-flex items-center gap-1.5 rounded-full bg-brand-sunken px-2.5 py-0.5 font-mono text-[0.6875rem] font-medium text-brand-text">
          {lang(job.source).code}
          <svg viewBox="0 0 12 12" className="h-2.5 w-2.5 text-brand-subtle" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M2 6h8M7 3l3 3-3 3" strokeLinecap="round" strokeLinejoin="round"/></svg>
          {lang(job.target).code}
        </span>
        <span className="text-[0.75rem] text-brand-muted">{lang(job.target).name}</span>
        <StatusBadge status={job.status} />
        {job.ambiguities > 0 && (
          <span className="inline-flex items-center gap-1 rounded-full bg-amber-50 px-2 py-0.5 text-[0.6875rem] font-medium text-amber-700 ring-1 ring-inset ring-amber-200">
            {job.ambiguities} amb
          </span>
        )}
        {job.insights > 0 && (
          <span className="rounded-full bg-brand-sunken px-2 py-0.5 text-[0.6875rem] font-medium text-brand-muted">
            {job.insights} ins
          </span>
        )}
        {isProc && (
          <div className="ml-1 flex items-center gap-2">
            <div className="h-[3px] w-32 overflow-hidden rounded-full bg-brand-sunken ring-1 ring-inset ring-black/[0.02]">
              <div className="h-full rounded-full bg-gradient-to-r from-brand-accent to-brand-accentHov transition-[width] duration-700" style={{ width: `${job.progress}%` }} />
            </div>
            <span className="font-mono text-[0.6875rem] text-brand-muted">{job.progress}%</span>
          </div>
        )}
        <div className="ml-auto flex items-center gap-2">
          {canExpand && (
            <span className="text-[0.6875rem] text-brand-subtle">
              {expanded ? "Hide peek" : "Peek"}
            </span>
          )}
          <button
            onClick={(e) => e.stopPropagation()}
            className={
              isReview
                ? "flex items-center gap-1 rounded-full bg-brand-text px-3 py-1 text-[0.6875rem] font-medium text-white hover:bg-brand-accent transition-colors"
                : "rounded-full border border-brand-border bg-brand-surface px-3 py-1 text-[0.6875rem] font-medium text-brand-muted hover:text-brand-text hover:bg-brand-sunken transition-colors"
            }
          >
            {isReview ? <>Open review <Icon.Arrow className="h-3 w-3" /></> : job.status === "exported" ? "Download" : job.status === "processing" ? "Monitor" : "View"}
          </button>
        </div>
      </div>

      {expanded && canExpand && <ReviewPeek job={job} doc={doc} />}
    </>
  );

// Inline block review peek + modals (New Project, New Translation)
// Restyled to match Dashboard / Documents / Projects system.

function ReviewPeek({ job, doc }) {
  const blocks = (window.HELVARA_DATA.reviewBlocks[job.id]) || null;
  const [decisions, setDecisions] = useState({});
  const [activeBlock, setActiveBlock] = useState(null);

  if (!blocks) {
    return (
      <div className="border-t border-brand-borderSoft bg-brand-sunken/40 px-5 py-5 pl-14">
        <p className="text-[0.8125rem] text-brand-muted m-0">Block-level review will appear here when Autopilot finishes this job.</p>
      </div>
    );
  }

  const approveAll = () => {
    const next = { ...decisions };
    blocks.forEach((b) => {
      if (b.status === "ambiguity") next[b.id] = next[b.id] || { status: "approved", pick: 0 };
      else next[b.id] = { status: "approved" };
    });
    setDecisions(next);
  };

  const decidedCount = blocks.filter((b) => decisions[b.id]?.status === "approved" || b.status === "approved").length;

  return (
    <div className="border-t border-brand-borderSoft bg-brand-sunken/40 px-5 py-5 pl-14 animate-slidedown">
      {/* Peek header */}
      <div className="mb-4 flex items-center justify-between gap-3">
        <div>
          <p className="text-[0.6875rem] font-semibold uppercase tracking-[0.18em] text-brand-accent m-0">Review peek</p>
          <p className="mt-1 font-display text-[1.0625rem] font-semibold tracking-display text-brand-text m-0">
            {doc.name} <span className="font-sans font-normal text-brand-subtle">·</span> <span className="font-mono text-[0.875rem] font-medium text-brand-muted">{lang(job.source).code} → {lang(job.target).code}</span>
          </p>
        </div>
        <div className="flex items-center gap-2">
          <span className="text-[0.75rem] text-brand-muted">
            <span className="font-mono font-medium text-brand-text">{decidedCount}</span>
            <span className="text-brand-subtle"> / </span>
            <span className="font-mono">{blocks.length}</span> approved
          </span>
          <button
            onClick={approveAll}
            className="rounded-full border border-brand-border bg-brand-surface px-3 py-1 text-[0.75rem] font-medium text-brand-muted hover:text-brand-text hover:bg-brand-sunken shadow-card transition-colors"
          >
            Approve remaining
          </button>
          <button
            onClick={() => window.__helvaraDispatch && window.__helvaraDispatch({ type: "OPEN_REVIEW", jobId: job.id })}
            className="flex items-center gap-1 rounded-full bg-brand-text px-3.5 py-1.5 text-[0.75rem] font-medium text-white hover:bg-brand-accent transition-colors"
          >
            Open full review <Icon.Arrow className="h-3 w-3" />
          </button>
        </div>
      </div>

      {/* Block list */}
      <div className="overflow-hidden rounded-2xl border border-brand-border bg-brand-surface shadow-card">
        {blocks.map((b, i) => {
          const decision = decisions[b.id];
          const isActive = activeBlock === b.id;
          const effectiveStatus = decision?.status || b.status;
          return (
            <BlockRow
              key={b.id}
              block={b}
              index={i}
              active={isActive}
              effectiveStatus={effectiveStatus}
              decision={decision}
              onActivate={() => setActiveBlock(isActive ? null : b.id)}
              onDecide={(update) => setDecisions({ ...decisions, [b.id]: update })}
            />
          );
        })}
      </div>
    </div>
  );
}

function BlockRow({ block, index, active, effectiveStatus, decision, onActivate, onDecide }) {
  const isAmb = block.status === "ambiguity";
  const rowBg = active ? "bg-brand-accentSoft/60" : "bg-brand-surface hover:bg-brand-sunken/40";

  const statusDot =
    effectiveStatus === "approved" ? "bg-status-success" :
    effectiveStatus === "ambiguity" && !decision ? "bg-amber-500" :
    "bg-brand-hint";

  return (
    <div className={`border-b border-brand-borderSoft last:border-0 ${rowBg} transition-colors`}>
      <button onClick={onActivate} className="w-full text-left px-5 py-3.5 bg-transparent border-0 cursor-pointer">
        <div className="flex items-start gap-4">
          <div className="flex shrink-0 flex-col items-center gap-1.5 pt-0.5">
            <span className="font-mono text-[0.625rem] font-medium uppercase tracking-wider text-brand-subtle">B{String(index + 1).padStart(2, "0")}</span>
            <span className={`h-1.5 w-1.5 rounded-full ${statusDot}`} />
          </div>
          <div className="grid min-w-0 flex-1 grid-cols-2 gap-5">
            <div className="min-w-0">
              <p className="mb-1 font-mono text-[0.625rem] font-medium uppercase tracking-[0.14em] text-brand-subtle m-0">Source · EN</p>
              <p className="text-[0.8125rem] leading-relaxed text-brand-text m-0">{block.source}</p>
            </div>
            <div className="min-w-0">
              <p className="mb-1 font-mono text-[0.625rem] font-medium uppercase tracking-[0.14em] text-brand-accent m-0">Target · {lang("es-ES").code}</p>
              <p className="text-[0.8125rem] leading-relaxed text-brand-text m-0">
                {decision?.pick !== undefined ? block.alternatives[decision.pick] : block.target}
              </p>
            </div>
          </div>
          <div className="flex shrink-0 flex-col items-end gap-1.5 pt-0.5">
            {effectiveStatus === "approved" && (
              <span className="inline-flex items-center gap-1 rounded-full bg-emerald-50 px-2.5 py-0.5 text-[0.6875rem] font-medium text-emerald-700 ring-1 ring-inset ring-emerald-200">
                <Icon.Check className="h-2.5 w-2.5" /> Approved
              </span>
            )}
            {effectiveStatus === "ambiguity" && !decision && (
              <span className="rounded-full bg-amber-50 px-2.5 py-0.5 text-[0.6875rem] font-medium text-amber-700 ring-1 ring-inset ring-amber-200">
                Ambiguous
              </span>
            )}
            {effectiveStatus === "pending" && (
              <span className="rounded-full bg-brand-sunken px-2.5 py-0.5 text-[0.6875rem] font-medium text-brand-muted">Pending</span>
            )}
            {block.insights?.map((ins, idx) => (
              <span key={idx} className="inline-flex items-center gap-1 whitespace-nowrap rounded-full bg-brand-accentSoft px-2 py-0.5 text-[0.625rem] font-medium text-brand-accent">
                {ins.kind === "glossary" ? "Glossary" : ins.kind === "memory" ? "Memory" : "Ambiguity"}
              </span>
            ))}
          </div>
        </div>
      </button>

      {/* Expanded detail */}
      {active && (
        <div className="border-t border-brand-borderSoft bg-brand-sunken/30 px-5 pb-4 pt-4 pl-[4.25rem] animate-slidedown">
          {isAmb && (
            <div className="mb-3 rounded-2xl border border-amber-200 bg-amber-50/50 p-4">
              <p className="mb-2 flex items-center gap-1.5 text-[0.6875rem] font-semibold uppercase tracking-[0.18em] text-amber-800 m-0">
                <Icon.Sparkle className="h-3 w-3" /> Linguistic insight — ambiguity
              </p>
              <p className="mb-3 text-[0.8125rem] leading-relaxed text-brand-text m-0">{block.ambiguityReason}</p>
              <div className="space-y-2">
                {block.alternatives.map((alt, idx) => {
                  const selected = (decision?.pick ?? 0) === idx;
                  return (
                    <button
                      key={idx}
                      onClick={(e) => { e.stopPropagation(); onDecide({ status: "approved", pick: idx }); }}
                      className={`block w-full rounded-xl border px-3.5 py-2.5 text-left text-[0.8125rem] transition-all ${
                        selected
                          ? "border-brand-accent bg-brand-surface text-brand-text shadow-card"
                          : "border-brand-border bg-brand-surface text-brand-text hover:border-brand-accent/40 hover:bg-brand-sunken/40"
                      }`}
                    >
                      <div className="flex items-start gap-2.5">
                        <span className={`mt-[0.1875rem] flex h-4 w-4 shrink-0 items-center justify-center rounded-full border ${selected ? "border-brand-accent bg-brand-accent text-white" : "border-brand-border bg-brand-surface"}`}>
                          {selected && <Icon.Check className="h-2.5 w-2.5" />}
                        </span>
                        <span className="flex-1">
                          <span className="mr-2 font-mono text-[0.625rem] font-medium uppercase tracking-[0.14em] text-brand-subtle">Option {idx + 1}</span>
                          {alt}
                        </span>
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {block.insights?.filter((i) => i.kind !== "ambiguity").map((ins, idx) => (
            <div key={idx} className="mb-2 rounded-xl border border-brand-border bg-brand-surface p-3.5">
              <p className="mb-1 flex items-center gap-1.5 text-[0.6875rem] font-semibold uppercase tracking-[0.18em] text-brand-accent m-0">
                {ins.kind === "glossary" ? "Glossary match" : "Memory match"}
                {ins.term && <span className="font-sans font-normal normal-case tracking-normal text-brand-text">· {ins.term}</span>}
              </p>
              <p className="text-[0.8125rem] leading-relaxed text-brand-muted m-0">{ins.note}</p>
            </div>
          ))}

          {!isAmb && effectiveStatus !== "approved" && (
            <div className="flex items-center gap-2">
              <button
                onClick={(e) => { e.stopPropagation(); onDecide({ status: "approved" }); }}
                className="flex items-center gap-1 rounded-full bg-brand-text px-3.5 py-1.5 text-[0.75rem] font-medium text-white hover:bg-brand-accent transition-colors"
              >
                <Icon.Check className="h-3 w-3" /> Approve
              </button>
              <button
                onClick={(e) => e.stopPropagation()}
                className="rounded-full border border-brand-border bg-brand-surface px-3.5 py-1.5 text-[0.75rem] font-medium text-brand-muted hover:text-brand-text hover:bg-brand-sunken shadow-card transition-colors"
              >
                Edit translation
              </button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// Documents view — cross-project view with toggle (Documents | Jobs) + filters

function DocumentsView({ state, dispatch }) {
  const projects = state.projects;

  const allDocs = [];
  const allJobs = [];
  projects.forEach((p) => {
    (p.documents || []).forEach((d) => {
      allDocs.push({ ...d, projectId: p.id, projectName: p.name });
      (d.jobs || []).forEach((j) => {
        allJobs.push({ ...j, projectId: p.id, projectName: p.name, docId: d.id, docName: d.name });
      });
    });
  });

  const [mode, setMode] = useState("documents");
  const [q, setQ] = useState("");
  const [projectFilter, setProjectFilter] = useState("all");
  const [statusFilter, setStatusFilter] = useState("all");

  const qlc = q.trim().toLowerCase();
  const docs = allDocs.filter((d) => {
    if (projectFilter !== "all" && d.projectId !== +projectFilter) return false;
    if (qlc && !(d.name.toLowerCase().includes(qlc) || d.projectName.toLowerCase().includes(qlc))) return false;
    return true;
  });
  const jobs = allJobs.filter((j) => {
    if (projectFilter !== "all" && j.projectId !== +projectFilter) return false;
    if (statusFilter !== "all" && j.status !== statusFilter) return false;
    if (qlc && !(j.docName.toLowerCase().includes(qlc) || j.projectName.toLowerCase().includes(qlc) || j.target.toLowerCase().includes(qlc))) return false;
    return true;
  });

  return (
    <div className="mx-auto max-w-[1320px] px-10 py-10">
      <header className="mb-8 flex items-end justify-between gap-6">
        <div>
          <p className="mb-2 text-[0.6875rem] font-medium uppercase tracking-[0.18em] text-brand-subtle m-0">Workspace</p>
          <h1 className="font-display text-[2.5rem] font-semibold tracking-display leading-[1.05] text-brand-text m-0">
            Documents
          </h1>
          <p className="mt-2.5 text-[0.9375rem] text-brand-muted m-0">
            <span className="font-medium text-brand-text">{allDocs.length}</span> files · <span className="font-medium text-brand-text">{allJobs.length}</span> translation jobs across {projects.length} projects
          </p>
        </div>
        <button
          onClick={() => dispatch({ type: "OPEN_NEW_TRANSLATION", projectId: null })}
          className="flex items-center gap-1.5 rounded-full bg-brand-text px-4 py-2 text-[0.8125rem] font-medium text-white shadow-card transition-all hover:bg-brand-accent"
        >
          <Icon.Plus className="h-3.5 w-3.5" /> New translation
        </button>
      </header>

      {/* Filter bar */}
      <div className="mb-5 flex items-center gap-3">
        <div className="inline-flex rounded-full border border-brand-border bg-brand-surface p-0.5 shadow-card">
          {[
            { k: "documents", label: "Documents", count: allDocs.length },
            { k: "jobs", label: "Jobs", count: allJobs.length },
          ].map((t) => (
            <button
              key={t.k}
              onClick={() => setMode(t.k)}
              className={`inline-flex items-center gap-1.5 rounded-full px-3.5 py-1.5 text-[0.8125rem] font-medium transition-colors ${
                mode === t.k ? "bg-brand-text text-white" : "text-brand-muted hover:text-brand-text"
              }`}
            >
              {t.label}
              <span className={`rounded-full px-1.5 py-0.5 text-[0.625rem] tabular-nums ${mode === t.k ? "bg-white/20" : "bg-brand-sunken"}`}>{t.count}</span>
            </button>
          ))}
        </div>

        <div className="flex flex-1 items-center gap-2">
          <div className="relative flex-1">
            <Icon.Search className="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-brand-hint" />
            <input
              value={q}
              onChange={(e) => setQ(e.target.value)}
              placeholder="Search files, projects, languages…"
              className="w-full rounded-full border border-brand-border bg-brand-surface py-2 pl-9 pr-3.5 text-[0.8125rem] text-brand-text placeholder:text-brand-subtle shadow-card focus:border-brand-accent focus:outline-none focus:ring-2 focus:ring-brand-accent/15"
            />
          </div>
          <FilterSelect value={projectFilter} onChange={setProjectFilter}>
            <option value="all">All projects</option>
            {projects.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}
          </FilterSelect>
          {mode === "jobs" && (
            <FilterSelect value={statusFilter} onChange={setStatusFilter}>
              <option value="all">All statuses</option>
              <option value="pending">Pending</option>
              <option value="processing">Processing</option>
              <option value="in_review">In review</option>
              <option value="completed">Completed</option>
              <option value="exported">Exported</option>
            </FilterSelect>
          )}
        </div>
      </div>

      {mode === "documents" ? (
        <DocumentsTable rows={docs} dispatch={dispatch} />
      ) : (
        <JobsTable rows={jobs} dispatch={dispatch} />
      )}

      {((mode === "documents" && docs.length === 0) || (mode === "jobs" && jobs.length === 0)) && (
        <div className="mt-6 rounded-2xl border border-dashed border-brand-border bg-brand-surface p-10 text-center shadow-card">
          <p className="font-display text-lg font-semibold text-brand-text m-0">No matches</p>
          <p className="mt-1.5 text-sm text-brand-muted m-0">Try clearing a filter or changing your search.</p>
        </div>
      )}
    </div>
  );
}

        onChange={(e) => onChange(e.target.value)}

  const [running, setRunning] = useState(ap.queue);

      setRunning((prev) => prev.map((j) => {

        const bump = Math.random() * 2.4 + 0.2;
        return { ...j, progress: Math.min(100, +(j.progress + bump).toFixed(1)) };

    }, 1500);
    return () => clearInterval(t);

  const filteredMessages = filter === "all"
    ? ap.messages

// Translation Review — full-page review of a single job.
// Side-by-side columns, insight-first, with Rumi's reasoning inline.
// Keyboard: ↑/↓ to move between blocks, Enter to approve, 1-9 to pick alternative.

function TranslationReviewView({ state, dispatch }) {
  const data = window.HELVARA_DATA.reviewData[state.reviewJobId] || window.HELVARA_DATA.reviewData[1004];
  const agent = window.HELVARA_DATA.autopilot.agent;
  const [decisions, setDecisions] = useState({});
  const [activeIdx, setActiveIdx] = useState(0);
  const [density, setDensity] = useState("balanced"); // cozy | balanced | compact
  const [granularity, setGranularity] = useState("sentence"); // sentence | paragraph
  const [showDiff, setShowDiff] = useState(false);
  const blockRefs = useRef([]);

  // Keyboard nav
  useEffect(() => {
    const h = (e) => {
      if (e.target.tagName === "TEXTAREA" || e.target.tagName === "INPUT") return;
      const b = data.blocks[activeIdx];
      if (e.key === "ArrowDown" || e.key === "j") {
        e.preventDefault();
        const next = Math.min(data.blocks.length - 1, activeIdx + 1);
        setActiveIdx(next);
        blockRefs.current[next]?.scrollIntoView({ block: "center", behavior: "smooth" });
      } else if (e.key === "ArrowUp" || e.key === "k") {
        e.preventDefault();
        const prev = Math.max(0, activeIdx - 1);
        setActiveIdx(prev);
        blockRefs.current[prev]?.scrollIntoView({ block: "center", behavior: "smooth" });
      } else if (e.key === "Enter" && b) {
        e.preventDefault();
        approveBlock(b.id, decisions[b.id]?.pick ?? 0);
      } else if (/^[1-9]$/.test(e.key) && b?.alternatives) {
        const pick = parseInt(e.key, 10) - 1;
        if (pick < b.alternatives.length) {
          setDecisions({ ...decisions, [b.id]: { status: "approved", pick } });
        }
      }
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [activeIdx, decisions, data.blocks]);

  const approveBlock = (id, pick) => {
    setDecisions({ ...decisions, [id]: { status: "approved", pick: pick ?? 0 } });
  };
  const approveAll = () => {
    const next = { ...decisions };
    data.blocks.forEach((b) => {
      if (b.status === "ambiguity" && b.alternatives) next[b.id] = next[b.id] || { status: "approved", pick: 0 };
      else next[b.id] = { status: "approved" };
    });
    setDecisions(next);
  };

  const getEffective = (b) => decisions[b.id]?.status || b.status;
  const approved = data.blocks.filter((b) => getEffective(b) === "approved").length;
  const progressPct = Math.round((approved / data.blocks.length) * 100);

  return (
    <div className="flex h-full flex-col">
      {/* Sticky review header */}
      <ReviewHeader
        data={data}
        approved={approved}
        progressPct={progressPct}
        density={density} setDensity={setDensity}
        granularity={granularity} setGranularity={setGranularity}
        showDiff={showDiff} setShowDiff={setShowDiff}
        onApproveAll={approveAll}
        onBack={() => dispatch({ type: "OPEN_PROJECT", id: data.projectId })}
      />

      {/* Agent summary strip */}
      <AgentSummaryStrip data={data} agent={agent} />

      {/* Main body — block navigator + scrollable review area */}
      <div className="flex flex-1 overflow-hidden">
        <BlockNavigator
          blocks={data.blocks}
          decisions={decisions}
          activeIdx={activeIdx}
          onSelect={(i) => { setActiveIdx(i); blockRefs.current[i]?.scrollIntoView({ block: "center", behavior: "smooth" }); }}
          getEffective={getEffective}
        />

        <main className="flex-1 overflow-y-auto">
          <div className="mx-auto max-w-[1180px] px-10 py-8">
            <div className={density === "cozy" ? "space-y-6" : density === "compact" ? "space-y-2" : "space-y-4"}>
              {data.blocks.map((b, i) => (
                <div key={b.id} ref={(el) => (blockRefs.current[i] = el)}>
                  <ReviewBlock
                    block={b}
                    index={i}
                    active={activeIdx === i}
                    density={density}
                    showDiff={showDiff}
                    decision={decisions[b.id]}
                    effective={getEffective(b)}
                    onActivate={() => setActiveIdx(i)}
                    onApprove={(pick) => approveBlock(b.id, pick)}
                    onPickAlt={(pick) => setDecisions({ ...decisions, [b.id]: { status: "approved", pick } })}
                    target={data.target}
                  />
                </div>
              ))}
            </div>

            {/* Bottom CTA */}
            <div className="mt-10 flex items-center justify-between rounded-2xl border border-brand-border bg-brand-surface p-5 shadow-card">
              <div>
                <p className="font-display text-[1.0625rem] font-semibold tracking-display text-brand-text m-0">
                  {approved === data.blocks.length ? "All blocks approved." : `${data.blocks.length - approved} block${data.blocks.length - approved === 1 ? "" : "s"} remaining`}
                </p>
                <p className="mt-1 text-[0.8125rem] text-brand-muted m-0">Exporting locks edits. Rumi keeps the memory updated either way.</p>
              </div>
              <div className="flex items-center gap-2">
                <button className="rounded-full border border-brand-border bg-brand-surface px-4 py-2 text-[0.8125rem] font-medium text-brand-muted hover:text-brand-text hover:bg-brand-sunken shadow-card transition-colors">
                  Save draft
                </button>
                <button
                  disabled={approved !== data.blocks.length}
                  className="flex items-center gap-1 rounded-full bg-brand-text px-5 py-2 text-[0.8125rem] font-medium text-white hover:bg-brand-accent disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
                >
                  Approve & export <Icon.Arrow className="h-3.5 w-3.5" />
                </button>
              </div>
            </div>
          </div>
        </main>
      </div>

      {/* Keyboard hint footer */}
      <KeyboardHint />
    </div>
  );
}

// ── A single review block ───────────────────────────────────────────────────

  const targetText = block.alternatives ? block.alternatives[pick].text : block.target;

  const borderCls =
    active ? "border-brand-accent/50 shadow-[0_0_0_3px_rgba(13,123,110,0.06)]" :
    effective === "approved" ? "border-emerald-200/60" :
    effective === "ambiguity" ? "border-amber-200/60" :
    "border-brand-border";

  const compact = density === "compact";
  const pad = compact ? "p-3" : density === "cozy" ? "p-6" : "p-5";

  return (
    <article
      onClick={onActivate}
      className={`rounded-2xl border bg-brand-surface transition-all cursor-pointer ${borderCls} ${pad}`}

      {/* Header row */}
      <header className="mb-3 flex items-center gap-3">
        <span className="inline-flex items-center gap-1.5 font-mono text-[0.625rem] font-medium uppercase tracking-[0.14em] text-brand-subtle">
          <span className={`h-1.5 w-1.5 rounded-full ${
            effective === "approved" ? "bg-emerald-500" :
            effective === "ambiguity" ? "bg-amber-500" :
            "bg-brand-hint"
          }`} />
          B{String(index + 1).padStart(2, "0")}
        </span>
        <div className="flex-1" />
        <BlockStatusPill effective={effective} />
        {block.insights?.filter((i) => i.kind === "memory").slice(0, 1).map((ins, i) => (
          <span key={i} className="inline-flex items-center gap-1 rounded-full bg-blue-50 px-2 py-0.5 text-[0.625rem] font-medium text-blue-700 ring-1 ring-inset ring-blue-200">
            <span className="font-mono">{Math.round((ins.confidence || 0.9) * 100)}%</span> memory
          </span>
        ))}
      </header>

      {/* Body — two columns */}
      <div className="grid grid-cols-2 gap-5">
        <div>
          <p className="mb-1 flex items-center gap-1.5 font-mono text-[0.625rem] font-medium uppercase tracking-[0.14em] text-brand-subtle m-0">
            Source · {lang("en").code}
          </p>
          {showDiff && block.alignment ? (
            <AlignmentText segments={block.alignment} side="source" />
          ) : (
            <p className={`leading-relaxed text-brand-text m-0 ${compact ? "text-[0.8125rem]" : "text-[0.9375rem]"}`}>{block.source}</p>
          )}
        </div>
        <div>
          <p className="mb-1 flex items-center gap-1.5 font-mono text-[0.625rem] font-medium uppercase tracking-[0.14em] text-brand-accent m-0">
            Target · {lang(target).code}
          </p>
          {showDiff && block.alignment ? (
            <AlignmentText segments={block.alignment} side="target" />
          ) : (
            <p className={`leading-relaxed text-brand-text m-0 ${compact ? "text-[0.8125rem]" : "text-[0.9375rem]"}`}>{targetText}</p>
          )}
        </div>
      </div>

      {/* Insights — only show in balanced/cozy */}
      {!compact && block.insights && block.insights.length > 0 && (
        <div className="mt-4 space-y-2">
          {block.insights.map((ins, i) => (
            <InsightCard key={i} insight={ins} />
          ))}
        </div>
      )}

      {/* Ambiguity picker */}
      {isAmb && block.alternatives && (
        <div className="mt-4 rounded-xl border border-amber-200 bg-amber-50/40 p-4">
          <div className="mb-3 flex items-start gap-3">
            <span className="mt-0.5 flex h-5 w-5 shrink-0 items-center justify-center rounded-full bg-amber-100 text-amber-800">
              <svg viewBox="0 0 12 12" className="h-2.5 w-2.5" fill="currentColor"><circle cx="6" cy="6" r="5" /></svg>
            </span>
            <div className="min-w-0 flex-1">
              <p className="flex items-center gap-2 font-display text-[0.875rem] font-semibold tracking-display text-brand-text m-0">
                Rumi flagged this one
                <span className="rounded-full bg-amber-100 px-2 py-0.5 text-[0.625rem] font-medium uppercase tracking-[0.12em] text-amber-800">Ambiguity</span>
              </p>
              {block.agent_reasoning && (
                <p className="mt-1 text-[0.8125rem] leading-relaxed text-brand-muted m-0">{block.agent_reasoning}</p>
              )}
            </div>
          </div>
          <div className="space-y-2">
            {block.alternatives.map((alt, i) => {
              const selected = pick === i;
              return (
                <button
                  key={i}
                  onClick={(e) => { e.stopPropagation(); onPickAlt(i); }}
                  className={`block w-full rounded-xl border text-left transition-all ${
                    selected
                      ? "border-brand-accent bg-brand-surface shadow-card"
                      : "border-brand-border bg-brand-surface hover:border-brand-accent/40 hover:bg-brand-sunken/40"
                  }`}

                    </span>
                    <div className="min-w-0 flex-1">
                      <p className="text-[0.875rem] leading-relaxed text-brand-text m-0">{alt.text}</p>
                      <p className="mt-1 flex items-center gap-1.5 text-[0.6875rem] text-brand-muted m-0">
                        {alt.recommended && (
                          <span className="inline-flex items-center gap-1 rounded-full bg-brand-accentSoft px-1.5 py-0 font-mono text-[0.5625rem] font-medium uppercase tracking-[0.1em] text-brand-accent">

                    </div>

              );

          </div>

      {/* Footer actions */}
      {effective !== "approved" && (
        <div className="mt-4 flex items-center justify-between">
          <p className="text-[0.75rem] text-brand-subtle m-0">
            <span className="font-mono rounded bg-brand-sunken px-1.5 py-0.5 text-brand-muted">↵</span> approve
            {block.alternatives && <> · <span className="font-mono rounded bg-brand-sunken px-1.5 py-0.5 text-brand-muted">1–{block.alternatives.length}</span> pick alt</>}
          </p>
          <div className="flex items-center gap-2">
            <button
              onClick={(e) => e.stopPropagation()}
              className="rounded-full border border-brand-border bg-brand-surface px-3 py-1 text-[0.75rem] font-medium text-brand-muted hover:text-brand-text hover:bg-brand-sunken transition-colors"
            >
              Edit
            </button>
            <button
              onClick={(e) => { e.stopPropagation(); onApprove(pick); }}
              className="flex items-center gap-1 rounded-full bg-brand-text px-3.5 py-1 text-[0.75rem] font-medium text-white hover:bg-brand-accent transition-colors"
            >
              <Icon.Check className="h-3 w-3" /> Approve
            </button>
          </div>
        </div>
      )}
    </article>
  );
}

// ── Insight card ────────────────────────────────────────────────────────────
function InsightCard({ insight }) {

      label: "Memory",

        {cfg.label}

          <p className="font-mono text-[0.75rem] font-medium text-brand-text m-0">{insight.term}</p>
        )}

      </div>
      {insight.confidence != null && insight.confidence > 0 && (
        <span className="shrink-0 font-mono text-[0.6875rem] font-medium text-brand-muted">
          {Math.round(insight.confidence * 100)}%
        </span>
      )}

// ── Alignment text — tokens rendered as linked chips for EN↔XX diff ─────────
function AlignmentText({ segments, side }) {
  const [hovered, setHovered] = useState(null);
  return (
    <p className="m-0 text-[0.9375rem] leading-[1.9] text-brand-text">
      {segments.map((seg, i) => {
        const word = side === "source" ? seg.s : seg.t;
        const isGlossary = seg.glossary;
        const isHovered = hovered === i;
        return (
          <React.Fragment key={i}>
            <span
              onMouseEnter={() => setHovered(i)}
              onMouseLeave={() => setHovered(null)}
              className={`inline-block rounded px-0.5 transition-all cursor-default ${
                isHovered ? "bg-brand-accentSoft text-brand-accent" : ""
              } ${isGlossary ? "underline decoration-violet-400 decoration-2 underline-offset-[3px]" : ""}`}
            >
              {word}
            </span>
            {i < segments.length - 1 && " "}
          </React.Fragment>
        );
      })}
    </p>
  );
}

// ── Keyboard hint footer ────────────────────────────────────────────────────
function KeyboardHint() {
  return (
    <footer className="shrink-0 border-t border-brand-borderSoft bg-brand-surface/80 backdrop-blur">

function Kbd({ children }) {

}

// ===== app.jsx =====
// Main app — state + routing + Tweaks panel

function App() {
  const initialState = {
    view: "dashboard", // "dashboard" | "documents" | "projects" | "project" | "autopilot" | "review"
    projectId: null,
    reviewJobId: null,
    projects: window.HELVARA_DATA.projects,
    modal: null, // "new-project" | "new-translation"
    modalContext: null,
    toast: null,
    tweaksOpen: false,
  };
  const [state, setState] = useState(initialState);
  // persist location
  useEffect(() => {
    const saved = localStorage.getItem("helvara_nav");
    if (saved) {
      try {
        const p = JSON.parse(saved);
        setState((s) => ({ ...s, view: p.view || "dashboard", projectId: p.projectId ?? null }));
      } catch (e) {}
    }
  }, []);
  useEffect(() => {
    localStorage.setItem("helvara_nav", JSON.stringify({ view: state.view, projectId: state.projectId }));
  }, [state.view, state.projectId]);

  const dispatch = (a) => {
    setState((s) => {
      switch (a.type) {
        case "NAVIGATE":         return { ...s, view: a.view, projectId: null, reviewJobId: null };
        case "GO_PROJECTS":      return { ...s, view: "projects", projectId: null };
        case "OPEN_PROJECT":     return { ...s, view: "project", projectId: a.id };
        case "OPEN_REVIEW":      return { ...s, view: "review", reviewJobId: a.jobId };
        case "OPEN_NEW_PROJECT": return { ...s, modal: "new-project" };
        case "OPEN_NEW_TRANSLATION": return { ...s, modal: "new-translation", modalContext: { projectId: a.projectId } };
        case "CLOSE_MODAL":      return { ...s, modal: null, modalContext: null };
        case "TOAST":            return { ...s, toast: a.msg };
        case "CREATE_PROJECT": {
          const newP = {
            id: Date.now(),
            name: a.payload.name,
            description: a.payload.description,
            target_languages: a.payload.target_languages,
            due_date: a.payload.due_date,
            document_count: 0,
            stats: { total_jobs: 0, completed_count: 0, in_review_count: 0, total_words: 0 },
            documents: [],
          };
          return { ...s, projects: [newP, ...s.projects], modal: null, toast: `Project "${a.payload.name}" created` };
        }
        case "UPLOAD_TRANSLATION": {
          const { projectId, file, languages } = a.payload;
          const projects = s.projects.map((p) => {
            if (p.id !== projectId) return p;
            const newDocId = Date.now();
            const newJobs = languages.map((target, i) => ({
              id: newDocId + i, source: "en", target, status: "processing", ambiguities: 0, insights: 0, progress: 5, autopilot: true,
            }));
            const newDoc = { id: newDocId, name: file.name, words: 400, uploaded: "2026-04-22", jobs: newJobs };
            return {
              ...p,
              document_count: p.document_count + 1,
              documents: [newDoc, ...p.documents],
              stats: { ...p.stats, total_jobs: p.stats.total_jobs + languages.length, total_words: p.stats.total_words + 400 },
            };
          });
          return { ...s, projects, modal: null, toast: `Uploading "${file.name}" — ${languages.length} languages queued` };
        }
        case "TOGGLE_TWEAKS":    return { ...s, tweaksOpen: !s.tweaksOpen };
        default: return s;
      }
    });
  };

  // Expose dispatch globally so leaf components (ReviewPeek) can route without prop-drilling
  useEffect(() => { window.__helvaraDispatch = dispatch; }, []);

  // Auto-clear toast
  useEffect(() => {
    if (!state.toast) return;
    const t = setTimeout(() => setState((s) => ({ ...s, toast: null })), 3000);
    return () => clearTimeout(t);
  }, [state.toast]);

  // Edit-mode protocol
  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === "__activate_edit_mode") setState((s) => ({ ...s, tweaksOpen: true }));
      if (e.data?.type === "__deactivate_edit_mode") setState((s) => ({ ...s, tweaksOpen: false }));
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  return (
    <>
      <AppShell
        active={state.view === "project" ? "projects" : state.view === "review" ? "autopilot" : state.view}
        onGoHome={() => dispatch({ type: "NAVIGATE", view: "dashboard" })}
        onNavigate={(key) => dispatch({ type: "NAVIGATE", view: key })}
        onNewTranslation={() => dispatch({ type: "OPEN_NEW_TRANSLATION", projectId: null })}
      >
        <div data-screen-label={
          state.view === "dashboard" ? "01 Dashboard"
          : state.view === "documents" ? "02 Documents"
          : state.view === "projects" ? "03 Projects"
          : state.view === "project" ? "04 Project detail"
          : state.view === "autopilot" ? "05 Autopilot"
          : "06 Translation review"
        } className={state.view === "review" ? "h-full" : ""}>
          {state.view === "dashboard" && <DashboardView state={state} dispatch={dispatch} />}
          {state.view === "documents" && <DocumentsView state={state} dispatch={dispatch} />}
          {state.view === "projects" && <ProjectsView state={state} dispatch={dispatch} />}
          {state.view === "project" && <ProjectDetailView state={state} dispatch={dispatch} />}
          {state.view === "autopilot" && <AutopilotView state={state} dispatch={dispatch} />}
          {state.view === "review" && <TranslationReviewView state={state} dispatch={dispatch} />}
        </div>
      </AppShell>

      <NewProjectModal
        open={state.modal === "new-project"}
        onClose={() => dispatch({ type: "CLOSE_MODAL" })}
        onCreate={(payload) => dispatch({ type: "CREATE_PROJECT", payload })}
      />
      <NewTranslationModal
        open={state.modal === "new-translation"}
        onClose={() => dispatch({ type: "CLOSE_MODAL" })}
        projects={state.projects}
        projectId={state.modalContext?.projectId}
        onUpload={(payload) => dispatch({ type: "UPLOAD_TRANSLATION", payload })}
      />

      <Toast message={state.toast} />
      {state.tweaksOpen && <TweaksPanel />}
    </>
  );
}

// ── Tweaks panel ────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#0D7B6E",
  "density": "comfortable",
  "insightStyle": "inline",
  "autopilotBanner": true
}/*EDITMODE-END*/;

const ACCENTS = [
  { label: "Helvara Teal", value: "#0D7B6E", hov: "#0A6459", mid: "#E6F4F2" },
  { label: "Editorial Ink", value: "#1D3557", hov: "#152b47", mid: "#E7ECF2" },
  { label: "Terracotta",   value: "#B04A2E", hov: "#913B23", mid: "#F6E6DF" },
  { label: "Aubergine",    value: "#5B2B5F", hov: "#48224b", mid: "#EDE3EE" },
];

function TweaksPanel() {
  const [accent, setAccent] = useState(TWEAK_DEFAULTS.accent);
  const [density, setDensity] = useState(TWEAK_DEFAULTS.density);

  useEffect(() => {
    const a = ACCENTS.find((x) => x.value === accent) || ACCENTS[0];
    const root = document.documentElement;
    root.style.setProperty("--brand-accent", a.value);
    root.style.setProperty("--brand-accent-hov", a.hov);
    root.style.setProperty("--brand-accent-mid", a.mid);
    root.style.setProperty("--brand-accent-soft", a.mid + "80"); // rough soft tint
  }, [accent]);

  useEffect(() => {
    document.documentElement.dataset.density = density;
  }, [density]);

  const set = (key, val) => window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [key]: val } }, "*");

  return (
    <div className="fixed bottom-5 right-5 z-[60] w-[280px] rounded-[22px] border border-brand-border bg-brand-surface/95 backdrop-blur-md p-5 shadow-raised animate-scalein">
      <div className="mb-4 flex items-center justify-between">
        <div>
          <p className="text-[0.6875rem] font-semibold uppercase tracking-[0.18em] text-brand-subtle m-0">Design</p>
          <p className="mt-0.5 font-display text-[1rem] font-semibold tracking-display text-brand-text m-0">Tweaks</p>
        </div>
        <span className="flex h-7 w-7 items-center justify-center rounded-full bg-brand-accentSoft text-brand-accent">
          <Icon.Sparkle className="h-3.5 w-3.5" />
        </span>
      </div>

      <div className="mb-4">
        <p className="mb-2 text-[0.6875rem] font-medium uppercase tracking-[0.14em] text-brand-muted m-0">Accent</p>
        <div className="grid grid-cols-4 gap-1.5">
          {ACCENTS.map((a) => (
            <button
              key={a.value}
              onClick={() => { setAccent(a.value); set("accent", a.value); }}
              className={`relative h-11 rounded-xl transition-all ${
                accent === a.value
                  ? "ring-2 ring-brand-text ring-offset-2 ring-offset-brand-surface"
                  : "ring-1 ring-brand-border hover:ring-brand-hint"
              }`}
              style={{ background: a.value }}
              title={a.label}
              aria-label={a.label}
            >
              {accent === a.value && (
                <span className="absolute inset-0 flex items-center justify-center text-white">
                  <Icon.Check className="h-3.5 w-3.5" />
                </span>
              )}
            </button>
          ))}
        </div>
      </div>

      <div>
        <p className="mb-2 text-[0.6875rem] font-medium uppercase tracking-[0.14em] text-brand-muted m-0">Density</p>
        <div className="flex gap-1 rounded-full bg-brand-sunken p-1">
          {["comfortable", "compact"].map((d) => (
            <button
              key={d}
              onClick={() => { setDensity(d); set("density", d); }}
              className={`flex-1 rounded-full px-3 py-1.5 text-[0.75rem] font-medium transition-all ${
                density === d
                  ? "bg-brand-surface text-brand-text shadow-card"
                  : "text-brand-muted hover:text-brand-text"
              }`}
            >
              {d[0].toUpperCase() + d.slice(1)}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);



  </script>
</body>
